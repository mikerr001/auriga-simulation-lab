kind = "web"
previewPath = "/"
title = "Auriga Simulation Lab"
version = "1.0.0"
id = "artifacts/auriga-simulation-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22717

[services.development]
run = "pnpm --filter @workspace/auriga-simulation-lab run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/auriga-simulation-lab", "run", "build" ]
publicDir = "artifacts/auriga-simulation-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22717"
BASE_PATH = "/"
